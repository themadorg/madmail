name: "CI Pipeline"

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write
  checks: write

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  generate-delta-patch:
    name: Generate Delta Patch
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [semantic-release]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.5'
          cache: true
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev bsdiff
      - name: Build current binaries
        run: |
          GOARCH=amd64 sh build.sh build
          GOARCH=arm64 CGO_ENABLED=0 sh build.sh build
      - name: Generate delta patch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "Previous tag: $PREV_TAG"
            mkdir -p prev-bin
            gh release download "$PREV_TAG" -p "madmail-amd64" --dir prev-bin/ || true
            if [ -f prev-bin/madmail-amd64 ]; then
              chmod +x prev-bin/madmail-amd64
              bsdiff prev-bin/madmail-amd64 build/madmail-amd64 build/madmail-amd64.patch
              echo "${PREV_TAG#v}" > build/madmail-amd64.patch.version
              echo "✅ AMD64 delta patch generated ($(du -sh build/madmail-amd64.patch | cut -f1))"
            fi
            gh release download "$PREV_TAG" -p "madmail-arm64" --dir prev-bin/ || true
            if [ -f prev-bin/madmail-arm64 ]; then
              chmod +x prev-bin/madmail-arm64
              bsdiff prev-bin/madmail-arm64 build/madmail-arm64 build/madmail-arm64.patch
              echo "${PREV_TAG#v}" > build/madmail-arm64.patch.version
              echo "✅ ARM64 delta patch generated ($(du -sh build/madmail-arm64.patch | cut -f1))"
            fi
          else
            echo "No previous tag found, skipping delta patch generation."
          fi
      - name: Upload delta patch assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "")
          if [ -n "$CURRENT_TAG" ]; then
            for f in build/madmail-amd64.patch build/madmail-amd64.patch.version \
                     build/madmail-arm64.patch build/madmail-arm64.patch.version; do
              if [ -f "$f" ]; then
                gh release upload "$CURRENT_TAG" "$f" --clobber || true
              fi
            done
          fi

  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev
      - name: Create iroh-relay placeholder for linting
        run: |
          mkdir -p internal/endpoint/iroh/assets
          touch internal/endpoint/iroh/assets/iroh-relay
      - name: Create admin-web placeholder for embedding
        run: |
          mkdir -p internal/adminweb/build
          touch internal/adminweb/build/placeholder
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.9.0
          args: --timeout=30m
      - name: Build maddy
        run: |
          ./build.sh
          ./build.sh --destdir destdir/ install

  legacy-build:
    name: Legacy Build (Static/GLIBC-free)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true
      - name: Create iroh-relay placeholder
        run: |
          mkdir -p internal/endpoint/iroh/assets
          touch internal/endpoint/iroh/assets/iroh-relay
      - name: Create admin-web placeholder for embedding
        run: |
          mkdir -p internal/adminweb/build
          touch internal/adminweb/build/placeholder
      - name: Build legacy static binary
        run: |
          make build_legacy
      - name: Verify binary is static
        run: |
          echo "🔍 Checking binary linkage..."
          file build/maddy-amd64-legacy
          if ldd build/maddy-amd64-legacy 2>&1 | grep -q "not a dynamic executable"; then
            echo "✅ Binary is statically linked (no GLIBC dependency)"
          else
            echo "❌ Binary is dynamically linked! This defeats the purpose."
            ldd build/maddy-amd64-legacy
            exit 1
          fi
      - name: Smoke test binary
        run: |
          ./build/maddy-amd64-legacy version
      - name: Upload legacy binary artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: maddy-amd64-legacy
          path: build/maddy-amd64-legacy
          retention-days: 30

  build-summary:
    needs: [lint-and-build, legacy-build, docker-build-push]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate Build Summary
        run: |
          echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Build Status" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Build | ${{ needs.lint-and-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Legacy Build | ${{ needs.legacy-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Repository](${{ github.server_url }}/${{ github.repository }})" >> $GITHUB_STEP_SUMMARY

  docker-build-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: always() && needs.lint-and-build.result == 'success' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    needs: [lint-and-build, semantic-release]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest after semantic-release
        run: |
          git pull origin ${{ github.ref_name }} || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read app version
        id: version
        run: echo "VERSION=$(cat .version)" >> $GITHUB_OUTPUT

      - name: Docker meta (Madmail)
        id: meta-madmail
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.VERSION }}

      - name: Build and Push Madmail Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta-madmail.outputs.tags }}
          labels: ${{ steps.meta-madmail.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
